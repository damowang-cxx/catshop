map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  listen [::]:80;
  server_name elowynn.com www.elowynn.com;

  return 301 https://elowynn.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name elowynn.com www.elowynn.com;

  ssl_certificate /etc/nginx/ssl/elowynn.com/elowynn.com_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/elowynn.com/elowynn.com.key;
  # If your CA requires PEM chain file, switch to:
  # ssl_certificate /etc/nginx/ssl/elowynn.com/elowynn.com_bundle.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 10m;
  ssl_session_cache shared:SSL:10m;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  client_max_body_size 20m;

  # IMPORTANT:
  # Keep /api on the Next.js app (BFF) at 3000.
  # Do not proxy /api directly to the backend, otherwise auth cookie flow breaks.
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;
  }
}
